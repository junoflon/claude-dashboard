<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }

  .header {
    background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }
  .header h1 span { color: #da7756; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: #6e7681; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #3fb950; display: inline-block; }
  .sync-dot.stale { background: #d29922; }
  .sync-dot.offline { background: #f85149; }

  .main { padding: 20px 28px; }

  /* Summary cards */
  .summary { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 14px 20px; min-width: 130px; flex: 1;
  }
  .stat .num { font-size: 28px; font-weight: 700; color: #f0f6fc; }
  .stat .label { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .stat.working .num { color: #3fb950; }
  .stat.idle .num { color: #8b949e; }

  /* Session table */
  .table-wrap {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    overflow: hidden; margin-bottom: 24px;
  }
  .table-title {
    padding: 12px 16px; font-size: 13px; font-weight: 600; color: #8b949e;
    border-bottom: 1px solid #21262d; text-transform: uppercase; letter-spacing: 0.5px;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600;
    color: #6e7681; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid #21262d; background: #0d111780;
  }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #21262d; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: #1c2128; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
  }
  .status-badge.working { background: #23863620; color: #3fb950; }
  .status-badge.waiting { background: #d2992220; color: #d29922; }
  .status-badge.idle { background: #484f5820; color: #8b949e; }
  .status-badge .pulse {
    width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  }
  .status-badge.working .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .project-name { font-weight: 600; color: #f0f6fc; }
  .project-path { font-size: 10px; color: #6e7681; font-family: monospace; margin-top: 2px; }
  .branch { background: #1f2937; color: #79c0ff; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-family: monospace; }
  .commit-info { font-size: 11px; color: #8b949e; }
  .commit-hash { color: #da7756; font-family: monospace; }
  .changed-count { color: #d29922; font-weight: 600; }

  .last-action {
    font-size: 12px; color: #c9d1d9; max-width: 300px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .last-user-msg {
    font-size: 11px; color: #79c0ff; margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px;
  }
  .tools-used {
    display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;
  }
  .tool-tag {
    font-size: 9px; padding: 1px 6px; border-radius: 4px;
    background: #21262d; color: #8b949e; font-family: monospace;
  }

  .time-ago { font-size: 11px; color: #6e7681; }
  .uptime { font-size: 11px; color: #6e7681; }
  .msg-count { font-size: 11px; color: #6e7681; }

  /* Recent activity */
  .activity-wrap {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    overflow: hidden;
  }
  .activity-item {
    display: flex; gap: 12px; padding: 8px 16px; border-bottom: 1px solid #21262d;
    font-size: 12px; align-items: center;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-time { min-width: 60px; color: #6e7681; font-size: 11px; }
  .activity-project { color: #da7756; font-weight: 600; min-width: 100px; font-size: 11px; }
  .activity-text { color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .empty { text-align: center; padding: 40px; color: #6e7681; font-size: 13px; }

  /* Detail panel */
  .detail-row { display: none; }
  .detail-row.open { display: table-row; }
  .detail-row td { padding: 0; }
  .detail-content {
    padding: 12px 16px; background: #0d111780;
  }
  .detail-section { margin-bottom: 12px; }
  .detail-section-title { font-size: 11px; font-weight: 600; color: #6e7681; margin-bottom: 6px; text-transform: uppercase; }
  .action-item {
    font-size: 12px; padding: 4px 0; display: flex; gap: 8px; align-items: baseline;
  }
  .action-item .action-type { font-size: 10px; font-weight: 600; min-width: 50px; }
  .action-item .action-type.tool { color: #da7756; }
  .action-item .action-type.msg { color: #3fb950; }
  .action-item .action-detail { color: #c9d1d9; }
  .file-list { font-size: 11px; font-family: monospace; }
  .file-list div { padding: 2px 0; }
  .file-status { display: inline-block; width: 14px; font-weight: 700; }
  .file-status.M { color: #d29922; }
  .file-status.A { color: #3fb950; }
  .file-status.D { color: #f85149; }
  .file-status.Q { color: #f85149; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Claude</span> Dashboard</h1>
  <div class="header-right">
    <span class="sync-dot" id="syncDot"></span>
    <span id="syncStatus">연결 중...</span>
    <span id="lastUpdate"></span>
  </div>
</div>

<div class="main">
  <div class="summary" id="summary"></div>

  <div class="table-wrap">
    <div class="table-title">세션 현황</div>
    <table>
      <thead>
        <tr>
          <th>상태</th>
          <th>프로젝트</th>
          <th>브랜치</th>
          <th>최근 작업</th>
          <th>변경</th>
          <th>활동</th>
          <th>Uptime</th>
        </tr>
      </thead>
      <tbody id="sessionTable"></tbody>
    </table>
  </div>

  <div class="activity-wrap">
    <div class="table-title">최근 활동 타임라인</div>
    <div id="activityList"></div>
  </div>
</div>

<script>
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function timeAgo(ms) {
  if (ms < 10000) return '방금';
  if (ms < 60000) return `${Math.floor(ms/1000)}초 전`;
  if (ms < 3600000) return `${Math.floor(ms/60000)}분 전`;
  if (ms < 86400000) return `${Math.floor(ms/3600000)}시간 전`;
  return `${Math.floor(ms/86400000)}일 전`;
}

function formatUptime(ms) {
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function statusLabel(s) {
  const map = { working: '작업 중', waiting: '대기 중', idle: '대기' };
  return map[s] || s || 'idle';
}

function toggleDetail(sid) {
  const row = document.getElementById('detail-' + sid);
  if (row) row.classList.toggle('open');
}

function renderSession(s) {
  const status = s.status || 'idle';
  const git = s.git;

  let mainRow = `<tr onclick="toggleDetail('${s.sessionId}')" style="cursor:pointer">
    <td>
      <span class="status-badge ${status}">
        <span class="pulse"></span>
        ${statusLabel(status)}
      </span>
    </td>
    <td>
      <div class="project-name">${esc(s.projectName)}</div>
      <div class="project-path">${esc(s.cwd)}</div>
    </td>
    <td>${git ? `<span class="branch">${esc(git.branch)}</span>` : '-'}</td>
    <td>
      <div class="last-action">${esc(s.lastAction || '-')}</div>
      ${s.lastUserMessage ? `<div class="last-user-msg">"${esc(s.lastUserMessage)}"</div>` : ''}
      ${s.toolSummary?.length ? `<div class="tools-used">${s.toolSummary.map(t => `<span class="tool-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    </td>
    <td>${git?.changedFiles?.length ? `<span class="changed-count">${git.changedFiles.length}개</span>` : '<span style="color:#6e7681">-</span>'}</td>
    <td><span class="time-ago">${timeAgo(s.lastActivityAgo || s.uptime)}</span></td>
    <td><span class="uptime">${formatUptime(s.uptime)}</span></td>
  </tr>`;

  // Detail row (hidden by default, toggled on click)
  let detailHtml = '<div class="detail-content">';

  // Git info
  if (git) {
    detailHtml += `<div class="detail-section">
      <div class="detail-section-title">Git</div>
      <div class="commit-info"><span class="commit-hash">${esc(git.lastCommit?.hash)}</span> ${esc(git.lastCommit?.subject)} <span style="color:#6e7681">(${esc(git.lastCommit?.relTime)})</span></div>
      ${git.totalCommitsToday ? `<div style="font-size:11px;color:#8b949e;margin-top:2px">오늘 커밋: ${git.totalCommitsToday}개</div>` : ''}
    </div>`;

    if (git.changedFiles?.length) {
      detailHtml += `<div class="detail-section">
        <div class="detail-section-title">변경된 파일 (${git.changedFiles.length})</div>
        <div class="file-list">`;
      for (const f of git.changedFiles.slice(0, 10)) {
        const sc = f.status.charAt(0) === '?' ? 'Q' : f.status.charAt(0);
        detailHtml += `<div><span class="file-status ${sc}">${esc(f.status)}</span> ${esc(f.file)}</div>`;
      }
      if (git.changedFiles.length > 10) detailHtml += `<div style="color:#6e7681">+${git.changedFiles.length - 10}개 더</div>`;
      detailHtml += `</div></div>`;
    }
  }

  // Recent actions
  if (s.recentActions?.length) {
    detailHtml += `<div class="detail-section">
      <div class="detail-section-title">최근 작업 내역</div>`;
    for (const a of s.recentActions.slice().reverse()) {
      if (a.type === 'tool') {
        detailHtml += `<div class="action-item">
          <span class="action-type tool">${esc(a.name)}</span>
          <span class="action-detail">${esc(a.detail)}</span>
        </div>`;
      } else {
        detailHtml += `<div class="action-item">
          <span class="action-type msg">응답</span>
          <span class="action-detail">${esc(a.text)}</span>
        </div>`;
      }
    }
    detailHtml += `</div>`;
  }

  // Stats
  detailHtml += `<div class="detail-section">
    <div class="detail-section-title">통계</div>
    <div class="msg-count">메시지: 사용자 ${s.messageCount?.user || 0} / Claude ${s.messageCount?.assistant || 0} | PID: ${s.pid}</div>
  </div>`;

  detailHtml += '</div>';

  const detailRow = `<tr class="detail-row" id="detail-${s.sessionId}"><td colspan="7">${detailHtml}</td></tr>`;

  return mainRow + detailRow;
}

async function refresh() {
  try {
    const res = await fetch('/api/dashboard');
    if (res.status === 401) { window.location.href = '/login'; return; }
    const data = await res.json();

    // Sync indicator
    const syncAge = Date.now() - data.timestamp;
    const dot = document.getElementById('syncDot');
    const syncStatus = document.getElementById('syncStatus');
    if (syncAge < 15000) { dot.className = 'sync-dot'; syncStatus.textContent = '실시간'; }
    else if (syncAge < 60000) { dot.className = 'sync-dot stale'; syncStatus.textContent = `${Math.floor(syncAge/1000)}초 전`; }
    else { dot.className = 'sync-dot offline'; syncStatus.textContent = '오프라인'; }
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('ko-KR');

    // Summary
    const sessions = data.activeSessions || [];
    const working = sessions.filter(s => s.status === 'working').length;
    const waiting = sessions.filter(s => s.status === 'waiting').length;
    const idle = sessions.filter(s => s.status === 'idle' || !s.status).length;
    const totalChanges = sessions.reduce((sum, s) => sum + (s.git?.changedFiles?.length || 0), 0);

    document.getElementById('summary').innerHTML = `
      <div class="stat working"><div class="num">${working}</div><div class="label">작업 중</div></div>
      <div class="stat"><div class="num">${waiting}</div><div class="label">대기 중</div></div>
      <div class="stat idle"><div class="num">${idle}</div><div class="label">대기</div></div>
      <div class="stat"><div class="num">${sessions.length}</div><div class="label">전체 세션</div></div>
      <div class="stat"><div class="num">${totalChanges}</div><div class="label">변경 파일</div></div>
    `;

    // Table - preserve open detail rows
    const openDetails = new Set();
    document.querySelectorAll('.detail-row.open').forEach(el => openDetails.add(el.id.replace('detail-', '')));

    const table = document.getElementById('sessionTable');
    if (sessions.length === 0) {
      table.innerHTML = '<tr><td colspan="7" class="empty">활성 세션이 없습니다</td></tr>';
    } else {
      // Sort: working first, then waiting, then idle
      const order = { working: 0, waiting: 1, idle: 2 };
      sessions.sort((a, b) => (order[a.status] ?? 2) - (order[b.status] ?? 2));
      table.innerHTML = sessions.map(renderSession).join('');
      // Restore open states
      for (const sid of openDetails) {
        const el = document.getElementById('detail-' + sid);
        if (el) el.classList.add('open');
      }
    }

    // Activity timeline
    const history = data.recentHistory || [];
    const actList = document.getElementById('activityList');
    if (history.length === 0) {
      actList.innerHTML = '<div class="empty">최근 활동 없음</div>';
    } else {
      actList.innerHTML = history.slice().reverse().slice(0, 15).map(item => {
        const project = item.project ? item.project.split('/').pop() : '?';
        return `<div class="activity-item">
          <span class="activity-time">${timeAgo(Date.now() - item.timestamp)}</span>
          <span class="activity-project">${esc(project)}</span>
          <span class="activity-text">${esc(item.display)}</span>
        </div>`;
      }).join('');
    }
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
